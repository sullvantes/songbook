# fly.toml app configuration file generated for songbook-copper-frog-7225 on 2026-06-18T15:30:15-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'songbook-copper-frog-7225'
primary_region = 'lhr'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = "bash scripts/fly_release.sh"

[env]
  DJANGO_SETTINGS_MODULE = 'songbook.production'
  MEDIA_ROOT = '/data/media'
  PORT = '8000'
  SERVE_MEDIA = 'true'
  SITE_URL = 'https://songbook-copper-frog-7225.fly.dev'

[[mounts]]
  source = 'media_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '20s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
