# fly.toml app configuration file generated for songbook-k150ng on 2026-06-18T16:33:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'songbook-k150ng'
primary_region = 'iad'
console_command = '/code/manage.py shell'

[build]

[env]
  PORT = '8000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
