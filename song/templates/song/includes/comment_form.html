<form method="post" action="{{ action_url }}" class="mt-3">
  {% csrf_token %}
  <div class="mb-2">
    <label class="form-label visually-hidden" for="{{ form.body.id_for_label }}">Comment</label>
    {{ form.body }}
    {% if form.body.errors %}
      <div class="invalid-feedback d-block">{{ form.body.errors }}</div>
    {% endif %}
  </div>
  <button type="submit" class="btn btn-danger btn-sm">Post comment</button>
</form>
