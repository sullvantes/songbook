{% load seo_tags %}
{% with seo_title=title|default:default_seo_title seo_description=description|default:default_meta_description seo_type=og_type|default:"website" %}
  <meta name="description" content="{{ seo_description|striptags|truncatechars:160 }}">
  {% if robots %}
    <meta name="robots" content="{{ robots }}">
  {% endif %}
  <link rel="canonical" href="{% if canonical_url %}{{ canonical_url }}{% else %}{% absolute_uri request.path %}{% endif %}">
  <meta property="og:site_name" content="{{ site_name }}">
  <meta property="og:type" content="{{ seo_type }}">
  <meta property="og:title" content="{{ seo_title|striptags }}">
  <meta property="og:description" content="{{ seo_description|striptags|truncatechars:200 }}">
  <meta property="og:url" content="{% if canonical_url %}{{ canonical_url }}{% else %}{% absolute_uri request.path %}{% endif %}">
  {% if image %}
    <meta property="og:image" content="{{ image }}">
  {% endif %}
  <meta name="twitter:card" content="{% if image %}summary_large_image{% else %}summary{% endif %}">
  <meta name="twitter:title" content="{{ seo_title|striptags }}">
  <meta name="twitter:description" content="{{ seo_description|striptags|truncatechars:200 }}">
  {% if image %}
    <meta name="twitter:image" content="{{ image }}">
  {% endif %}
{% endwith %}
